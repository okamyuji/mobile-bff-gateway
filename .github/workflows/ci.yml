name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # go vet / go build / 品質ゲート一式。Go バージョンは従来 CI と同じ 1.25.x を明示する。
  # scripts/quality-gate.sh が gofmt / vet / test / staticcheck / golangci-lint / build を実行する。
  ci:
    uses: okamyuji/reusable-workflows/.github/workflows/go-ci.yml@v1
    with:
      go-version: "1.25.x"
      test-command: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
        scripts/quality-gate.sh

  # gitleaks による秘密情報スキャン（fetch-depth: 0 で履歴全体、GITHUB_TOKEN 内蔵）。
  # .gitleaks.toml はリポジトリ直下にあるため gitleaks が自動検出する。
  security:
    permissions:
      contents: read
      pull-requests: read
    uses: okamyuji/reusable-workflows/.github/workflows/security-scan.yml@v1
